keys:
  - &admin 
  - &private 
  - &public 

creation_rules:
  # General secrets on the machine
  - path_regex: hosts/private/secrets/[^/]+\.(yaml|json|env|ini)$
    key_groups:
    - age:
      - *admin
      - *private

  # Per container secrets
  - path_regex: hosts/private/containers/[^/]+/secret\.(yaml|json|env|ini)$
    key_groups:
    - age:
      - *admin
      - *private

  - path_regex: hosts/public/secrets/[^/]+\.(yaml|json|env|ini)$
    key_groups:
    - age:
      - *admin
      - *public
